name: app-ci-cd

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bank-app-argo-cd

jobs:

  stage-1-build-test:

    runs-on: ubuntu-latest

    steps:
    - name: code checkout
      uses: actions/checkout@v4

    - name: setup java JDK
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin' 

    - name: maven 
      run: mvn clean package  

    - name: trivy fs scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
       scan-type: 'fs'
       scan-ref: '.'

  stage-2-docker-build-push:
    runs-on: ubuntu-latest
    needs: stage-1-build-test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: docker-hub login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set vars
        id: vars
        run: |
          IMAGE_TAG="$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: docker build
        run: |
         docker build -t $IMAGE_NAME:${{ env.IMAGE_TAG }} .

      - name: image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: image push
        run: |
         docker push $IMAGE_NAME:${{ env.IMAGE_TAG }}
         

  stage-3-deploy-dev:
    runs-on: ubuntu-latest
    needs: stage-2-docker-build-push
    environment: dev
    env:
      IMAGE_TAG: ${{ needs.stage-2-docker-build-push.outputs.image_tag }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITOPS_REPO_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
  
      - name: Clone GitOps repo
        run: |
          git clone git@github.com:gamertech1/bank-app-gitops-config.git
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          
      - name: Update image tag
        run: |
          cd bank-app-gitops-config
          yq -i ".image.tag = \"${{ env.IMAGE_TAG }}\"" environments/dev/values.yaml
  
      - name: Commit changes
        run: |
          cd bank-app-gitops-config
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "Update image to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push
          
  stage-4-deploy-prod:
    runs-on: ubuntu-latest
    needs: stage-3-deploy-dev
    environment: prod
    env:
      IMAGE_TAG: ${{ needs.stage-2-docker-build-push.outputs.image_tag }}
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.GITOPS_REPO_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan github.com >> ~/.ssh/known_hosts
  
      - name: Clone GitOps repo
        run: |
          git clone git@github.com:gamertech1/bank-app-gitops-config.git
      - name: Install yq
        run: |
          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq
          
      - name: Update image tag
        run: |
          cd bank-app-gitops-config
          yq -i ".image.tag = \"${{ env.IMAGE_TAG }}\"" environments/prod/values.yaml
  
      - name: Commit changes
        run: |
          cd bank-app-gitops-config
          git config user.email "github-actions@github.com"
          git config user.name "github-actions"
          git add .
          git commit -m "Update image to ${{ env.IMAGE_TAG }}" || echo "No changes"
          git push      
       
        
      
      

        
    
  
