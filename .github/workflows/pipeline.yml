name: app-ci-cd

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/bank-app-argo-cd

jobs:

  stage-1-build-test:

    runs-on: ubuntu-latest

    steps:
    - name: code checkout
      uses: actions/checkout@v4

    - name: setup java JDK
      uses: actions/setup-java@v5.2.0
      with:
        java-version: '17'
        distribution: 'temurin' 

    - name: maven 
      run: mvn clean package  

    - name: trivy fs scan
      uses: aquasecurity/trivy-action@v0.36.0
      with:
       scan-type: 'fs'
       scan-ref: '.'

  stage-2-docker-build-push:
    runs-on: ubuntu-latest
    needs: stage-1-build-test
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - name: code checkout
        uses: actions/checkout@v4

      - name: docker-hub login
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Set vars
        id: vars
        run: |
          IMAGE_TAG="$(date +%Y%m%d%H%M%S)-${GITHUB_SHA::7}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: docker build
        run: |
         docker build -t $IMAGE_NAME:${{ env.IMAGE_TAG }} .

      - name: image scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: image push
        run: |
         docker push $IMAGE_NAME:${{ env.IMAGE_TAG }}
         

  stage-3-deploy-dev:
    needs: stage-2-docker-build-push
    uses: ./.github/workflows/update-image-tag.yml
    with:
      image_tag: ${{ needs.stage-2-docker-build-push.outputs.image_tag }}
      environment: dev
      value_file: environments/dev/values.yaml
      gitops_repo: gamertech1/bank-app-gitops-config
    secrets:
      GITOPS_REPO_PRIVATE_KEY: ${{ secrets.GITOPS_REPO_PRIVATE_KEY }}
      
  stage-4-deploy-prod:
    needs:
     - stage-2-docker-build-push
     - stage-3-deploy-dev
    uses: ./.github/workflows/update-image-tag.yml
    with:
      image_tag: ${{ needs.stage-2-docker-build-push.outputs.image_tag }}
      environment: prod
      value_file: environments/prod/values.yaml
      gitops_repo: gamertech1/bank-app-gitops-config
    secrets:
      GITOPS_REPO_PRIVATE_KEY: ${{ secrets.GITOPS_REPO_PRIVATE_KEY }}





